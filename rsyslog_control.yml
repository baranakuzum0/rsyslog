- name: Check RSYSLOG + Auditd + Bash Log Configuration
  hosts: all
  gather_facts: true
  become: yes
  vars:
    required_packages:
      - auditd
      - rsyslog
    auditd_plugin_paths:
      - /etc/audisp/plugins.d/syslog.conf
      - /etc/audit/plugins.d/syslog.conf

  tasks:
    - name: Check if required packages are installed
      ansible.builtin.package:
        name: "{{ item }}"
        state: present
      check_mode: yes
      register: package_check
      loop: "{{ required_packages }}"
      ignore_errors: yes

    - name: Check service status
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: started
        enabled: yes
      check_mode: yes
      register: service_status
      loop:
        - rsyslog.service
        - auditd.service
      ignore_errors: yes

    - name: Check which auditd plugin path exists
      ansible.builtin.stat:
        path: "{{ item }}"
      loop: "{{ auditd_plugin_paths }}"
      register: auditd_plugin_stat
      ignore_errors: yes

    - name: Set auditd plugin path fact
      set_fact:
        auditd_plugin_path: "{{ item.stat.path }}"
      loop: "{{ auditd_plugin_stat.results }}"
      when: item.stat is defined and item.stat.exists

    - name: Check if auditd syslog plugin is enabled (if path exists)
      ansible.builtin.lineinfile:
        path: "{{ auditd_plugin_path }}"
        regexp: '^active\s*=\s*yes'
        line: 'active = yes'
        state: present
      check_mode: yes
      register: auditd_syslog_check
      when: auditd_plugin_path is defined
      ignore_errors: yes

    - name: Check bash logging in /etc/profile
      ansible.builtin.lineinfile:
        path: /etc/profile
        regexp: '.*logger -p local5\.debug.*'
        line: '# Bash logging should be present'
        state: present
      check_mode: yes
      register: profile_bash_check
      ignore_errors: yes

    - name: Check bash logging in /root/.bashrc
      ansible.builtin.lineinfile:
        path: /root/.bashrc
        regexp: '.*logger -p local5\.debug.*'
        line: '# Bash logging should be present'
        state: present
      check_mode: yes
      register: bashrc_check
      ignore_errors: yes

    - name: Check rsyslog remote forwarding configuration
      ansible.builtin.lineinfile:
        path: /etc/rsyslog.conf
        regexp: 'local5\.\*,local6\.\*\s+@192\.168\.21\.21'
        line: 'local5.*,local6.* @192.168.21.21'
        state: present
      check_mode: yes
      register: rsyslog_remote_check
      ignore_errors: yes

    - name: Check auditd log forwarding in rsyslog.conf
      ansible.builtin.blockinfile:
        path: /etc/rsyslog.conf
        marker: "# {mark} ANSIBLE MANAGED AUDITD BLOCK"
        block: |
          # audit log
          $ModLoad imfile
          $InputFileName /var/log/audit/audit.log
          $InputFileTag tag_audit_log_.$hostname:
          $InputFileStateFile audit_log
          $InputFileSeverity info
          $InputFileFacility local6
          $InputRunFileMonitor
        state: present
      check_mode: yes
      register: rsyslog_auditd_check
      ignore_errors: yes

    - name: Check bash log file existence
      ansible.builtin.stat:
        path: /var/log/bash.log
      register: bash_log_file

    - name: Check rsyslog bash configuration
      ansible.builtin.lineinfile:
        path: /etc/rsyslog.d/bash.conf
        regexp: 'local5\.debug\s+/var/log/bash\.log'
        line: 'local5.debug                /var/log/bash.log'
        state: present
      check_mode: yes
      register: bash_conf_check
      ignore_errors: yes

    - name: Check 50-default.conf configuration
      ansible.builtin.lineinfile:
        path: /etc/rsyslog.d/50-default.conf
        regexp: '{{ item.regex }}'
        line: '{{ item.line }}'
        state: present
      check_mode: yes
      register: default_conf_check
      loop:
        - { regex: 'auth,authpriv\.\*\s+/var/log/auth\.log', line: 'auth,authpriv.*                 /var/log/auth.log', name: 'auth.log' }
        - { regex: '\*\.\*;auth,authpriv\.none\s+-/var/log/syslog', line: '*.*;auth,authpriv.none          -/var/log/syslog', name: 'syslog' }
        - { regex: 'cron\.\*\s+/var/log/cron\.log', line: 'cron.*                          /var/log/cron.log', name: 'cron.log' }
      ignore_errors: yes

    - name: Check for actual log entries in bash.log
      ansible.builtin.shell: |
        if [ -f /var/log/bash.log ] && [ "$(cat /var/log/bash.log | wc -l)" -gt 0 ]; then
          echo "✅ Log kayıtları var (son 3 satır):"
          tail -3 /var/log/bash.log | sed 's/^/    /'
        else
          echo "❌ Henüz log kaydı yok"
        fi
      register: bash_log_entries
      changed_when: false
      ignore_errors: yes

    - name: Set package status facts
      set_fact:
        package_status: "{{ package_status | default({}) | combine({item.item: '✅' if not item.changed else '❌'}) }}"
      loop: "{{ package_check.results }}"
      when: package_check.results is defined

    - name: Set service status facts
      set_fact:
        service_active: "{{ service_active | default({}) | combine({item.item: '✅' if item.status.ActiveState == 'active' else '❌'}) }}"
        service_enabled: "{{ service_enabled | default({}) | combine({item.item: '✅' if item.status.UnitFileState == 'enabled' else '❌'}) }}"
      loop: "{{ service_status.results }}"
      when: service_status.results is defined

    - name: Set default conf status facts
      set_fact:
        default_conf_status: "{{ default_conf_status | default({}) | combine({item.item.name: '✅' if not item.changed else '❌'}) }}"
      loop: "{{ default_conf_check.results }}"
      when: default_conf_check.results is defined

    - name: Set auditd plugin status fact
      set_fact:
        auditd_plugin_status: >-
          {% if auditd_plugin_path is not defined %}
          ❌
          {% elif auditd_syslog_check is defined and not auditd_syslog_check.changed %}
          ✅
          {% else %}
          ❌
          {% endif %}
        auditd_plugin_path_display: "{{ auditd_plugin_path | default('Bulunamadı') }}"

    - name: Display comprehensive configuration report
      ansible.builtin.debug:
        msg: 
          - "╔══════════════════════════════════════════════════════════════════════╗"
          - "║         RSYSLOG + AUDITD + BASH LOG KONFIGÜRASYON RAPORU            ║"
          - "╚══════════════════════════════════════════════════════════════════════╝"
          - ""
          - "┌────────────────────────────────────────────────────────────────┐"
          - "│ 📦 PAKETLER                                                     │"
          - "├────────────────────────────────────────────────────────────────┤"
          - "│   auditd  : [{{ package_status['auditd'] | default('❌') }}] {{ 'Kurulu' if package_status['auditd'] == '✅' else 'Kurulu Değil' }}"
          - "│   rsyslog : [{{ package_status['rsyslog'] | default('❌') }}] {{ 'Kurulu' if package_status['rsyslog'] == '✅' else 'Kurulu Değil' }}"
          - "└────────────────────────────────────────────────────────────────┘"
          - ""
          - "┌────────────────────────────────────────────────────────────────┐"
          - "│ ⚙️ SERVİSLER                                                    │"
          - "├────────────────────────────────────────────────────────────────┤"
          - "│   rsyslog.service :"
          - "│     • Aktif   : [{{ service_active['rsyslog.service'] | default('❌') }}] {{ 'Çalışıyor' if service_active['rsyslog.service'] == '✅' else 'Çalışmıyor' }}"
          - "│     • Enabled : [{{ service_enabled['rsyslog.service'] | default('❌') }}] {{ 'Aktif' if service_enabled['rsyslog.service'] == '✅' else 'Pasif' }}"
          - "│"
          - "│   auditd.service :"
          - "│     • Aktif   : [{{ service_active['auditd.service'] | default('❌') }}] {{ 'Çalışıyor' if service_active['auditd.service'] == '✅' else 'Çalışmıyor' }}"
          - "│     • Enabled : [{{ service_enabled['auditd.service'] | default('❌') }}] {{ 'Aktif' if service_enabled['auditd.service'] == '✅' else 'Pasif' }}"
          - "└────────────────────────────────────────────────────────────────┘"
          - ""
          - "┌────────────────────────────────────────────────────────────────┐"
          - "│ 🔧 AUDITD KONFIGÜRASYONU                                        │"
          - "├────────────────────────────────────────────────────────────────┤"
          - "│   Syslog plugin : [{{ auditd_plugin_status }}] {{ 'Aktif' if auditd_plugin_status == '✅' else 'Aktif Değil' }}"
          - "│   Plugin yolu   : {{ auditd_plugin_path_display }}"
          - "└────────────────────────────────────────────────────────────────┘"
          - ""
          - "┌────────────────────────────────────────────────────────────────┐"
          - "│ 🐚 BASH LOG KONFIGÜRASYONU                                      │"
          - "├────────────────────────────────────────────────────────────────┤"
          - "│   /etc/profile     : [{{ '✅' if not profile_bash_check.changed else '❌' }}] {{ 'Yapılandırılmış' if not profile_bash_check.changed else 'Yapılandırılmamış' }}"
          - "│   /root/.bashrc    : [{{ '✅' if not bashrc_check.changed else '❌' }}] {{ 'Yapılandırılmış' if not bashrc_check.changed else 'Yapılandırılmamış' }}"
          - "│   /var/log/bash.log: [{{ '✅' if bash_log_file.stat.exists else '❌' }}] {{ 'Mevcut' if bash_log_file.stat.exists else 'Mevcut Değil' }}"
          - "│   bash.conf        : [{{ '✅' if not bash_conf_check.changed else '❌' }}] {{ 'Mevcut' if not bash_conf_check.changed else 'Mevcut Değil' }}"
          - "└────────────────────────────────────────────────────────────────┘"
          - ""
          - "┌────────────────────────────────────────────────────────────────┐"
          - "│ 📡 RSYSLOG KONFIGÜRASYONU                                       │"
          - "├────────────────────────────────────────────────────────────────┤"
          - "│   Remote forward (192.168.21.21) : [{{ '✅' if not rsyslog_remote_check.changed else '❌' }}] {{ 'Yapılandırılmış' if not rsyslog_remote_check.changed else 'Yapılandırılmamış' }}"
          - "│   Auditd log forwarding          : [{{ '✅' if not rsyslog_auditd_check.changed else '❌' }}] {{ 'Yapılandırılmış' if not rsyslog_auditd_check.changed else 'Yapılandırılmamış' }}"
          - "└────────────────────────────────────────────────────────────────┘"
          - ""
          - "┌────────────────────────────────────────────────────────────────┐"
          - "│ 📋 50-default.conf KONTROLÜ                                     │"
          - "├────────────────────────────────────────────────────────────────┤"
          - "│   auth.log  : [{{ default_conf_status['auth.log'] | default('❌') }}] {{ 'Yapılandırılmış' if default_conf_status['auth.log'] == '✅' else 'Yapılandırılmamış' }}"
          - "│   syslog    : [{{ default_conf_status['syslog'] | default('❌') }}] {{ 'Yapılandırılmış' if default_conf_status['syslog'] == '✅' else 'Yapılandırılmamış' }}"
          - "│   cron.log  : [{{ default_conf_status['cron.log'] | default('❌') }}] {{ 'Yapılandırılmış' if default_conf_status['cron.log'] == '✅' else 'Yapılandırılmamış' }}"
          - "└────────────────────────────────────────────────────────────────┘"
          - ""
          - "┌────────────────────────────────────────────────────────────────┐"
          - "│ 📝 BASH LOG KAYITLARI                                           │"
          - "├────────────────────────────────────────────────────────────────┤"
          {% for line in bash_log_entries.stdout_lines %}
          - "│   {{ line }}"
          {% endfor %}
          - "└────────────────────────────────────────────────────────────────┘"
          - ""
          - "╔══════════════════════════════════════════════════════════════════════╗"
          - "║                      ✓ = Tamam  ✗ = Eksik/Hatalı                    ║"
          - "╚══════════════════════════════════════════════════════════════════════╝"
