---
- name: RSYSLOG + AUDITD + BASH DOC COMPLIANCE CHECK
  hosts: all
  become: yes
  gather_facts: false

  vars:
    remote_ip: "192.168.21.21"
    missing_items: []

  tasks:

  ################################################
  # SERVICE CHECK
  ################################################

  - service_facts:

  - name: Check auditd installed
    set_fact:
      missing_items: "{{ missing_items + ['auditd servisi kurulu değil'] }}"
    when: "'auditd.service' not in ansible_facts.services"

  - name: Check rsyslog installed
    set_fact:
      missing_items: "{{ missing_items + ['rsyslog servisi kurulu değil'] }}"
    when: "'rsyslog.service' not in ansible_facts.services"

  - name: Check auditd active
    set_fact:
      missing_items: "{{ missing_items + ['auditd servisi çalışmıyor'] }}"
    when:
      - "'auditd.service' in ansible_facts.services"
      - ansible_facts.services['auditd.service'].state != "running"

  - name: Check rsyslog active
    set_fact:
      missing_items: "{{ missing_items + ['rsyslog servisi çalışmıyor'] }}"
    when:
      - "'rsyslog.service' in ansible_facts.services"
      - ansible_facts.services['rsyslog.service'].state != "running"

  ################################################
  # BASH LOGGER CHECK
  ################################################

  - name: Check /etc/profile logger
    shell: grep "logger -p local5.debug" /etc/profile
    register: profile_check
    changed_when: false
    failed_when: false

  - name: Add missing profile config
    set_fact:
      missing_items: "{{ missing_items + ['/etc/profile içinde bash logger kodu yok'] }}"
    when: profile_check.rc != 0

  - name: Check /root/.bashrc logger
    shell: grep "logger -p local5.debug" /root/.bashrc
    register: bashrc_check
    changed_when: false
    failed_when: false

  - name: Add missing bashrc config
    set_fact:
      missing_items: "{{ missing_items + ['/root/.bashrc içinde bash logger kodu yok'] }}"
    when: bashrc_check.rc != 0

  ################################################
  # AUDIT PLUGIN CHECK
  ################################################

  - name: Detect audit plugin file
    shell: |
      if [ -f /etc/audisp/plugins.d/syslog.conf ]; then
        echo /etc/audisp/plugins.d/syslog.conf
      elif [ -f /etc/audit/plugins.d/syslog.conf ]; then
        echo /etc/audit/plugins.d/syslog.conf
      fi
    register: audit_plugin
    changed_when: false

  - name: Missing audit plugin file
    set_fact:
      missing_items: "{{ missing_items + ['audit syslog plugin dosyası yok'] }}"
    when: audit_plugin.stdout == ""

  - name: Check active=yes
    shell: grep "^active = yes" {{ audit_plugin.stdout }}
    register: audit_active
    changed_when: false
    failed_when: false
    when: audit_plugin.stdout != ""

  - name: Audit plugin not active
    set_fact:
      missing_items: "{{ missing_items + ['audit syslog plugin active = yes değil'] }}"
    when:
      - audit_plugin.stdout != ""
      - audit_active.rc != 0

  ################################################
  # RSYSLOG CHECK
  ################################################

  - name: Check remote forward
    shell: grep "{{ remote_ip }}" /etc/rsyslog.conf
    register: remote_check
    changed_when: false
    failed_when: false

  - name: Missing remote forwarding
    set_fact:
      missing_items: "{{ missing_items + ['rsyslog remote forwarding eksik'] }}"
    when: remote_check.rc != 0

  - name: Check imfile block
    shell: grep "InputFileName /var/log/audit/audit.log" /etc/rsyslog.conf
    register: imfile_check
    changed_when: false
    failed_when: false

  - name: Missing imfile config
    set_fact:
      missing_items: "{{ missing_items + ['rsyslog audit imfile konfigürasyonu eksik'] }}"
    when: imfile_check.rc != 0

  ################################################
  # BASH LOG FILE
  ################################################

  - stat:
      path: /var/log/bash.log
    register: bashlog

  - name: Missing bash.log
    set_fact:
      missing_items: "{{ missing_items + ['/var/log/bash.log dosyası yok'] }}"
    when: not bashlog.stat.exists

  ################################################
  # DEFAULT CONF CHECK
  ################################################

  - name: Check 50-default rules
    shell: grep "{{ item }}" /etc/rsyslog.d/50-default.conf
    loop:
      - "auth,authpriv.*"
      - "*.*;auth,authpriv.none"
      - "cron.*"
      - "local1.*"
      - "mail.err"
      - "*.emerg"
    register: default_rules
    changed_when: false
    failed_when: false

  - name: Collect missing default rules
    set_fact:
      missing_items: "{{ missing_items + ['50-default.conf içinde eksik kural: ' + item.item] }}"
    loop: "{{ default_rules.results }}"
    when: item.rc != 0

  ################################################
  # FINAL REPORT
  ################################################

  - name: Display Compliance Result
    debug:
      msg: |
        ======================================================
        RSYSLOG + AUDITD + BASH DOC COMPLIANCE RAPORU
        ======================================================

        {% if missing_items | length == 0 %}
        ✅ Sistem dokümana tamamen uygun.
        {% else %}
        ❌ Eksik / Hatalı Konfigürasyonlar:

        {% for item in missing_items %}
        - {{ item }}
        {% endfor %}
        {% endif %}
