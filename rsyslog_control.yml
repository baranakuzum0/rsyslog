---
- name: RSYSLOG + AUDITD + BASH COMPLIANCE CHECK
  hosts: all
  become: yes
  gather_facts: yes

  vars:
    rsyslog_service: rsyslog.service
    auditd_service: auditd.service
    audit_plugin_paths:
      - /etc/audisp/plugins.d/syslog.conf
      - /etc/audit/plugins.d/syslog.conf

  tasks:

    - name: Collect all service facts
      ansible.builtin.service_facts:

    - name: Set service facts safely
      set_fact:
        rsyslog_installed: "{{ rsyslog_service in ansible_facts.services }}"
        rsyslog_active: "{{ ansible_facts.services[rsyslog_service].state == 'running' if rsyslog_service in ansible_facts.services else false }}"
        rsyslog_enabled: "{{ ansible_facts.services[rsyslog_service].enabled | default(false) if rsyslog_service in ansible_facts.services else false }}"

        auditd_installed: "{{ auditd_service in ansible_facts.services }}"
        auditd_active: "{{ ansible_facts.services[auditd_service].state == 'running' if auditd_service in ansible_facts.services else false }}"
        auditd_enabled: "{{ ansible_facts.services[auditd_service].enabled | default(false) if auditd_service in ansible_facts.services else false }}"

    - name: Check /etc/profile exists
      ansible.builtin.stat:
        path: /etc/profile
      register: profile_file

    - name: Check /root/.bashrc exists
      ansible.builtin.stat:
        path: /root/.bashrc
      register: bashrc_file

    - name: Find existing auditd plugin file
      ansible.builtin.stat:
        path: "{{ item }}"
      loop: "{{ audit_plugin_paths }}"
      register: audit_plugin_stat

    - name: Set auditd plugin path
      set_fact:
        auditd_plugin_path: "{{ item.stat.path }}"
      loop: "{{ audit_plugin_stat.results }}"
      when: item.stat.exists

    - name: Check if auditd plugin is active
      ansible.builtin.lineinfile:
        path: "{{ auditd_plugin_path }}"
        regexp: '^active\s*=\s*yes'
        line: 'active = yes'
        state: present
      check_mode: yes
      register: auditd_syslog_check
      when: auditd_plugin_path is defined
      ignore_errors: yes

    - name: Check /var/log/bash.log existence
      ansible.builtin.stat:
        path: /var/log/bash.log
      register: bashlog_stat

    - name: Check /etc/rsyslog.d/bash.conf existence
      ansible.builtin.stat:
        path: /etc/rsyslog.d/bash.conf
      register: local5_conf

    - name: Check /etc/rsyslog.conf existence
      ansible.builtin.stat:
        path: /etc/rsyslog.conf
      register: rsyslog_conf_file

    - name: Check remote forwarding configuration
      ansible.builtin.shell: grep -q 'local5.*,local6.* *@192.168.21.21' /etc/rsyslog.conf
      register: remote_check
      ignore_errors: yes

    - name: Check 50-default.conf existence
      ansible.builtin.stat:
        path: /etc/rsyslog.d/50-default.conf
      register: default_conf

    - name: Build compliance report
      set_fact:
        compliance_errors: >-
          {{
            []
            + (["rsyslog servisi kurulu değil"] if not rsyslog_installed else [])
            + (["rsyslog servisi aktif değil"] if not rsyslog_active else [])
            + (["rsyslog servisi enabled değil"] if not rsyslog_enabled else [])
            + (["auditd servisi kurulu değil"] if not auditd_installed else [])
            + (["auditd servisi aktif değil"] if not auditd_active else [])
            + (["auditd servisi enabled değil"] if not auditd_enabled else [])
            + (["/etc/profile bash logger eksik"] if profile_file.stat.exists == false else [])
            + (["/root/.bashrc bash logger eksik"] if bashrc_file.stat.exists == false else [])
            + (["auditd syslog plugin yok"] if auditd_plugin_path is not defined else [])
            + (["/var/log/bash.log dosyası yok"] if bashlog_stat.stat.exists == false else [])
            + (["/etc/rsyslog.d/bash.conf eksik"] if local5_conf.stat.exists == false else [])
            + (["rsyslog remote forwarding eksik"] if remote_check.rc != 0 else [])
            + (["50-default.conf eksik"] if default_conf.stat.exists == false else [])
          }}

    - name: Display Compliance Result
      ansible.builtin.debug:
        msg: |
          ======================================================
          RSYSLOG + AUDITD + BASH COMPLIANCE RAPORU
          ======================================================

          {% if compliance_errors | length == 0 %}
          🎉 Tüm maddeler eksiksiz uygulanmış.
          {% else %}
          ❌ Eksik / Hatalı Konfigürasyonlar:

          {% for item in compliance_errors %}
          - {{ item }}
          {% endfor %}
          {% endif %}
