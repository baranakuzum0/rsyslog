- name: Check RSYSLOG + Auditd + Bash Log Configuration
  hosts: all
  gather_facts: true
  become: yes
  vars:
    required_packages:
      - auditd
      - rsyslog

  tasks:
    - name: Check everything with single shell command
      ansible.builtin.shell: |
        # Paket kontrolü
        echo "=== PACKAGES ==="
        dpkg -l | grep -E "auditd|rsyslog" || echo "not found"
        
        # Servis durumu
        echo "=== SERVICES ==="
        systemctl is-active rsyslog.service auditd.service 2>/dev/null || echo "inactive"
        systemctl is-enabled rsyslog.service auditd.service 2>/dev/null || echo "disabled"
        
        # Auditd plugin
        echo "=== AUDITD PLUGIN ==="
        grep "^active" /etc/audisp/plugins.d/syslog.conf 2>/dev/null || echo "not configured"
        
        # Bash log konfigürasyonu
        echo "=== BASH LOG CONFIG ==="
        grep -l "logger -p local5.debug" /etc/profile /root/.bashrc 2>/dev/null || echo "not found"
        
        # Rsyslog konfigürasyonu
        echo "=== RSYSLOG CONFIG ==="
        grep "local5.*,local6.* @192.168.21.21" /etc/rsyslog.conf || echo "remote forward not found"
        
        # Auditd log forwarding
        echo "=== AUDITD FORWARDING ==="
        grep -A6 "imfile.*audit" /etc/rsyslog.conf || echo "audit forwarding not found"
        
        # Bash log dosyası
        echo "=== BASH LOG FILE ==="
        ls -la /var/log/bash.log 2>/dev/null || echo "bash.log not found"
        
        # Bash conf
        echo "=== BASH CONF ==="
        cat /etc/rsyslog.d/bash.conf 2>/dev/null || echo "bash.conf not found"
        
        # 50-default.conf
        echo "=== 50-DEFAULT.CONF ==="
        grep -E "auth\.log|syslog|cron\.log" /etc/rsyslog.d/50-default.conf || echo "rules not found"
        
        # Son loglar
        echo "=== RECENT LOGS ==="
        tail -3 /var/log/bash.log 2>/dev/null || echo "no bash logs yet"
      register: system_check
      changed_when: false
      ignore_errors: yes

    - name: Parse and display results
      ansible.builtin.debug:
        msg: "{{ system_check.stdout.split('\n') }}"
