---
- name: RSYSLOG + AUDITD + BASH COMPLIANCE CHECK
  hosts: all
  become: yes
  gather_facts: yes

  vars:
    rsyslog_service: rsyslog
    auditd_service: auditd
    audit_plugin_paths:
      - /etc/audisp/plugins.d/syslog.conf
      - /etc/audit/plugins.d/syslog.conf

  tasks:

  # ------------------------------------------------------
  # Servislerin durumunu kontrol et (active & enabled)
  # ------------------------------------------------------
  - name: Check service active status
    shell: systemctl is-active {{ item }}
    register: service_active
    ignore_errors: yes
    loop:
      - "{{ rsyslog_service }}"
      - "{{ auditd_service }}"

  - name: Check service enabled status
    shell: systemctl is-enabled {{ item }}
    register: service_enabled
    ignore_errors: yes
    loop:
      - "{{ rsyslog_service }}"
      - "{{ auditd_service }}"

  - name: Set service facts
    set_fact:
      rsyslog_active: "{{ '✅' if service_active.results[0].stdout == 'active' else '❌' }}"
      auditd_active: "{{ '✅' if service_active.results[1].stdout == 'active' else '❌' }}"
      rsyslog_enabled: "{{ '✅' if service_enabled.results[0].stdout == 'enabled' else '❌' }}"
      auditd_enabled: "{{ '✅' if service_enabled.results[1].stdout == 'enabled' else '❌' }}"

  # ------------------------------------------------------
  # Bash ve Auditd dosyalarını kontrol et
  # ------------------------------------------------------
  - name: Check /etc/profile exists
    stat:
      path: /etc/profile
    register: profile_file

  - name: Check /root/.bashrc exists
    stat:
      path: /root/.bashrc
    register: bashrc_file

  - name: Find auditd plugin file
    stat:
      path: "{{ item }}"
    loop: "{{ audit_plugin_paths }}"
    register: audit_plugin_stat

  - name: Set auditd plugin path
    set_fact:
      auditd_plugin_path: "{{ item.stat.path }}"
    loop: "{{ audit_plugin_stat.results }}"
    when: item.stat.exists

  - name: Check /var/log/bash.log
    stat:
      path: /var/log/bash.log
    register: bashlog_stat

  - name: Check /etc/rsyslog.d/bash.conf
    stat:
      path: /etc/rsyslog.d/bash.conf
    register: local5_conf

  - name: Check /etc/rsyslog.conf for audit imfile block
    shell: grep -q '$ModLoad imfile' /etc/rsyslog.conf
    register: audit_imfile_conf
    ignore_errors: yes

  - name: Check remote forwarding (local5.*,local6.* @192.168.21.21)
    shell: grep -q 'local5.*,local6.* *@192.168.21.21' /etc/rsyslog.conf
    register: remote_check
    ignore_errors: yes

  - name: Check 50-default.conf exists
    stat:
      path: /etc/rsyslog.d/50-default.conf
    register: default_conf

  # ------------------------------------------------------
  # Compliance raporu oluştur
  # ------------------------------------------------------
  - name: Build compliance report
    set_fact:
      compliance_errors: >-
        {{
          []
          + (["rsyslog servisi aktif değil"] if rsyslog_active == '❌' else [])
          + (["rsyslog servisi enabled değil"] if rsyslog_enabled == '❌' else [])
          + (["auditd servisi aktif değil"] if auditd_active == '❌' else [])
          + (["auditd servisi enabled değil"] if auditd_enabled == '❌' else [])
          + (["/etc/profile bash logger eksik"] if profile_file.stat.exists == false else [])
          + (["/root/.bashrc bash logger eksik"] if bashrc_file.stat.exists == false else [])
          + (["auditd syslog plugin yok"] if auditd_plugin_path is not defined else [])
          + (["/var/log/bash.log dosyası yok"] if bashlog_stat.stat.exists == false else [])
          + (["/etc/rsyslog.d/bash.conf eksik"] if local5_conf.stat.exists == false else [])
          + (["/etc/rsyslog.conf audit imfile yok"] if audit_imfile_conf.rc != 0 else [])
          + (["rsyslog remote forwarding eksik"] if remote_check.rc != 0 else [])
          + (["50-default.conf eksik"] if default_conf.stat.exists == false else [])
        }}

  # ------------------------------------------------------
  # Compliance raporunu göster
  # ------------------------------------------------------
  - name: Display Compliance Result
    debug:
      msg: |
        ======================================================
        RSYSLOG + AUDITD + BASH COMPLIANCE RAPORU
        ======================================================

        {% if compliance_errors | length == 0 %}
        🎉 Tüm maddeler eksiksiz uygulanmış.
        {% else %}
        ❌ Eksik / Hatalı Konfigürasyonlar:

        {% for item in compliance_errors %}
        - {{ item }}
        {% endfor %}
        {% endif %}
