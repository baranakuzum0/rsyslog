---
- name: RSYSLOG + Auditd + Bash Log Read-Only Compliance Check
  hosts: all
  gather_facts: false
  become: yes

  vars:
    remote_log_server: "192.168.21.21"

  tasks:

  ############################################################
  # PACKAGE CHECK (REAL CHECK)
  ############################################################

  - name: Check installed packages
    shell: "rpm -q {{ item }}"
    register: pkg_check
    loop:
      - auditd
      - rsyslog
    changed_when: false
    failed_when: false

  - name: Set package facts
    set_fact:
      package_status: "{{ package_status | default({}) | combine({item.item: ('✅' if item.rc == 0 else '❌')}) }}"
    loop: "{{ pkg_check.results }}"

  ############################################################
  # SERVICE CHECK (NO BLOCKING)
  ############################################################

  - name: Gather service facts
    service_facts:

  - name: Set service facts
    set_fact:
      service_active: "{{ service_active | default({}) | combine({item: ('✅' if ansible_facts.services[item].state == 'running' else '❌')}) }}"
      service_enabled: "{{ service_enabled | default({}) | combine({item: ('✅' if ansible_facts.services[item].status == 'enabled' else '❌')}) }}"
    loop:
      - rsyslog.service
      - auditd.service
    when: ansible_facts.services[item] is defined

  ############################################################
  # AUDITD PLUGIN CHECK
  ############################################################

  - name: Detect auditd syslog plugin path
    shell: |
      if [ -f /etc/audisp/plugins.d/syslog.conf ]; then
        echo /etc/audisp/plugins.d/syslog.conf
      elif [ -f /etc/audit/plugins.d/syslog.conf ]; then
        echo /etc/audit/plugins.d/syslog.conf
      fi
    register: auditd_plugin_path
    changed_when: false

  - name: Check auditd plugin active status
    shell: "grep '^active' {{ auditd_plugin_path.stdout }}"
    register: auditd_plugin_check
    changed_when: false
    failed_when: false
    when: auditd_plugin_path.stdout != ""

  - name: Set auditd plugin fact
    set_fact:
      auditd_plugin_status: >-
        {% if auditd_plugin_path.stdout == "" %}
        ❌
        {% elif 'yes' in auditd_plugin_check.stdout %}
        ✅
        {% else %}
        ❌
        {% endif %}
      auditd_plugin_path_display: "{{ auditd_plugin_path.stdout | default('Bulunamadı') }}"

  ############################################################
  # BASH LOG CHECK
  ############################################################

  - name: Check bash logger in profile
    shell: "grep 'logger -p local5.debug' /etc/profile"
    register: profile_check
    changed_when: false
    failed_when: false

  - name: Check bash logger in root bashrc
    shell: "grep 'logger -p local5.debug' /root/.bashrc"
    register: bashrc_check
    changed_when: false
    failed_when: false

  - name: Check bash.log file
    stat:
      path: /var/log/bash.log
    register: bash_log_file

  - name: Check bash log entries
    shell: "tail -3 /var/log/bash.log"
    register: bash_log_entries
    changed_when: false
    failed_when: false
    when: bash_log_file.stat.exists

  ############################################################
  # RSYSLOG CONFIG CHECK
  ############################################################

  - name: Check remote forwarding
    shell: "grep '{{ remote_log_server }}' /etc/rsyslog.conf"
    register: remote_check
    changed_when: false
    failed_when: false

  - name: Validate rsyslog config syntax
    shell: "rsyslogd -N1"
    register: rsyslog_validate
    changed_when: false
    failed_when: false

  ############################################################
  # REPORT
  ############################################################

  - name: Display Report
    debug:
      msg:
        - "════════════════════════════════════════════"
        - "RSYSLOG + AUDITD + BASH COMPLIANCE REPORT"
        - "════════════════════════════════════════════"
        - ""
        - "📦 PACKAGES"
        - "  auditd  : {{ package_status['auditd'] }}"
        - "  rsyslog : {{ package_status['rsyslog'] }}"
        - ""
        - "⚙️ SERVICES"
        - "  rsyslog.service"
        - "     Active  : {{ service_active['rsyslog.service'] | default('❌') }}"
        - "     Enabled : {{ service_enabled['rsyslog.service'] | default('❌') }}"
        - "  auditd.service"
        - "     Active  : {{ service_active['auditd.service'] | default('❌') }}"
        - "     Enabled : {{ service_enabled['auditd.service'] | default('❌') }}"
        - ""
        - "🔧 AUDITD"
        - "  Plugin Path  : {{ auditd_plugin_path_display }}"
        - "  Plugin Active: {{ auditd_plugin_status }}"
        - ""
        - "🐚 BASH LOG"
        - "  /etc/profile : {{ '✅' if profile_check.rc == 0 else '❌' }}"
        - "  /root/.bashrc: {{ '✅' if bashrc_check.rc == 0 else '❌' }}"
        - "  bash.log     : {{ '✅' if bash_log_file.stat.exists else '❌' }}"
        - ""
        - "📡 RSYSLOG"
        - "  Remote Forward: {{ '✅' if remote_check.rc == 0 else '❌' }}"
        - "  Config Syntax : {{ '✅' if 'error' not in rsyslog_validate.stderr else '❌' }}"
        - ""
        - "📝 Sample Logs"
        - "  {{ bash_log_entries.stdout | default('Log yok') }}"
        - ""
        - "════════════════════════════════════════════"
