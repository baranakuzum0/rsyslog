- name: Check RSYSLOG + Auditd + Bash Log Configuration
  hosts: all
  gather_facts: true
  become: yes
  vars:
    required_packages:
      - auditd
      - rsyslog
    auditd_plugin_paths:
      - /etc/audisp/plugins.d/syslog.conf
      - /etc/audit/plugins.d/syslog.conf

  tasks:
    - name: Check if required packages are installed
      ansible.builtin.package:
        name: "{{ item }}"
        state: present
      check_mode: yes
      register: package_check
      loop: "{{ required_packages }}"
      ignore_errors: yes

    - name: Check service status
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: started
        enabled: yes
      check_mode: yes
      register: service_status
      loop:
        - rsyslog.service
        - auditd.service
      ignore_errors: yes

    - name: Check which auditd plugin path exists
      ansible.builtin.stat:
        path: "{{ item }}"
      loop: "{{ auditd_plugin_paths }}"
      register: auditd_plugin_stat
      ignore_errors: yes

    - name: Set auditd plugin path fact
      set_fact:
        auditd_plugin_path: "{{ item.stat.path }}"
      loop: "{{ auditd_plugin_stat.results }}"
      when: item.stat is defined and item.stat.exists

    - name: Check auditd plugin status with shell
      ansible.builtin.shell: |
        if [ -f "{{ auditd_plugin_path }}" ]; then
          if grep -q "^active\s*=\s*yes" "{{ auditd_plugin_path }}"; then
            echo "✅"
          else
            echo "❌"
          fi
        else
          echo "❌"
        fi
      register: auditd_plugin_check
      when: auditd_plugin_path is defined
      changed_when: false
      ignore_errors: yes

    - name: Check bash logging in /etc/profile with shell
      ansible.builtin.shell: |
        if [ -f /etc/profile ]; then
          if grep -q "logger -p local5.debug" /etc/profile; then
            echo "✅"
          else
            echo "❌"
          fi
        else
          echo "❌"
        fi
      register: profile_check
      changed_when: false
      ignore_errors: yes

    - name: Check bash logging in /root/.bashrc with shell
      ansible.builtin.shell: |
        if [ -f /root/.bashrc ]; then
          if grep -q "logger -p local5.debug" /root/.bashrc; then
            echo "✅"
          else
            echo "❌"
          fi
        else
          echo "❌"
        fi
      register: bashrc_check
      changed_when: false
      ignore_errors: yes

    - name: Check rsyslog remote forwarding with shell
      ansible.builtin.shell: |
        if [ -f /etc/rsyslog.conf ]; then
          if grep -q "local5.*,local6.* @192.168.21.21" /etc/rsyslog.conf; then
            echo "✅"
          else
            echo "❌"
          fi
        else
          echo "❌"
        fi
      register: rsyslog_remote_check
      changed_when: false
      ignore_errors: yes

    - name: Check auditd log forwarding in rsyslog.conf with shell
      ansible.builtin.shell: |
        if [ -f /etc/rsyslog.conf ]; then
          if grep -q "\$InputFileName /var/log/audit/audit.log" /etc/rsyslog.conf; then
            echo "✅"
          else
            echo "❌"
          fi
        else
          echo "❌"
        fi
      register: rsyslog_auditd_check
      changed_when: false
      ignore_errors: yes

    - name: Check bash log file existence
      ansible.builtin.stat:
        path: /var/log/bash.log
      register: bash_log_file

    - name: Check rsyslog bash configuration with shell
      ansible.builtin.shell: |
        if [ -f /etc/rsyslog.d/bash.conf ]; then
          if grep -q "local5.debug.*/var/log/bash.log" /etc/rsyslog.d/bash.conf; then
            echo "✅"
          else
            echo "❌"
          fi
        else
          echo "❌"
        fi
      register: bash_conf_check
      changed_when: false
      ignore_errors: yes

    - name: Check 50-default.conf with shell
      ansible.builtin.shell: |
        if [ -f /etc/rsyslog.d/50-default.conf ]; then
          AUTH=$(grep -c "auth,authpriv.*/var/log/auth.log" /etc/rsyslog.d/50-default.conf)
          SYSLOG=$(grep -c "\*\.\*;auth,authpriv.none.*-/var/log/syslog" /etc/rsyslog.d/50-default.conf)
          CRON=$(grep -c "cron.*/var/log/cron.log" /etc/rsyslog.d/50-default.conf)
          
          if [ $AUTH -gt 0 ]; then echo "auth:✅"; else echo "auth:❌"; fi
          if [ $SYSLOG -gt 0 ]; then echo "syslog:✅"; else echo "syslog:❌"; fi
          if [ $CRON -gt 0 ]; then echo "cron:✅"; else echo "cron:❌"; fi
        else
          echo "auth:❌"
          echo "syslog:❌"
          echo "cron:❌"
        fi
      register: default_conf_check
      changed_when: false
      ignore_errors: yes

    - name: Check for actual log entries in bash.log
      ansible.builtin.shell: |
        if [ -f /var/log/bash.log ] && [ "$(cat /var/log/bash.log | wc -l)" -gt 0 ]; then
          echo "✅ Log kayıtları var (son 3 satır):"
          tail -3 /var/log/bash.log | sed 's/^/    /'
        else
          echo "❌ Henüz log kaydı yok"
        fi
      register: bash_log_entries
      changed_when: false
      ignore_errors: yes

    - name: Parse 50-default.conf results
      set_fact:
        auth_status: "{{ default_conf_check.stdout_lines | select('match', 'auth:.*') | first | regex_replace('auth:', '') | default('❌') }}"
        syslog_status: "{{ default_conf_check.stdout_lines | select('match', 'syslog:.*') | first | regex_replace('syslog:', '') | default('❌') }}"
        cron_status: "{{ default_conf_check.stdout_lines | select('match', 'cron:.*') | first | regex_replace('cron:', '') | default('❌') }}"
      when: default_conf_check.stdout_lines is defined

    - name: Set package status facts
      set_fact:
        package_status: "{{ package_status | default({}) | combine({item.item: '✅' if not item.changed else '❌'}) }}"
      loop: "{{ package_check.results }}"
      when: package_check.results is defined

    - name: Set service status facts
      set_fact:
        service_active: "{{ service_active | default({}) | combine({item.item: '✅' if item.status.ActiveState == 'active' else '❌'}) }}"
        service_enabled: "{{ service_enabled | default({}) | combine({item.item: '✅' if item.status.UnitFileState == 'enabled' else '❌'}) }}"
      loop: "{{ service_status.results }}"
      when: service_status.results is defined

    - name: Display comprehensive configuration report
      ansible.builtin.debug:
        msg: 
          - "╔══════════════════════════════════════════════════════════════════════╗"
          - "║         RSYSLOG + AUDITD + BASH LOG KONFIGÜRASYON RAPORU            ║"
          - "╚══════════════════════════════════════════════════════════════════════╝"
          - ""
          - "┌────────────────────────────────────────────────────────────────┐"
          - "│ 📦 PAKETLER                                                     │"
          - "├────────────────────────────────────────────────────────────────┤"
          - "│   auditd  : [{{ package_status['auditd'] | default('❌') }}] {{ 'Kurulu' if package_status['auditd'] == '✅' else 'Kurulu Değil' }}"
          - "│   rsyslog : [{{ package_status['rsyslog'] | default('❌') }}] {{ 'Kurulu' if package_status['rsyslog'] == '✅' else 'Kurulu Değil' }}"
          - "└────────────────────────────────────────────────────────────────┘"
          - ""
          - "┌────────────────────────────────────────────────────────────────┐"
          - "│ ⚙️ SERVİSLER                                                    │"
          - "├────────────────────────────────────────────────────────────────┤"
          - "│   rsyslog.service :"
          - "│     • Aktif   : [{{ service_active['rsyslog.service'] | default('❌') }}] {{ 'Çalışıyor' if service_active['rsyslog.service'] == '✅' else 'Çalışmıyor' }}"
          - "│     • Enabled : [{{ service_enabled['rsyslog.service'] | default('❌') }}] {{ 'Aktif' if service_enabled['rsyslog.service'] == '✅' else 'Pasif' }}"
          - "│"
          - "│   auditd.service :"
          - "│     • Aktif   : [{{ service_active['auditd.service'] | default('❌') }}] {{ 'Çalışıyor' if service_active['auditd.service'] == '✅' else 'Çalışmıyor' }}"
          - "│     • Enabled : [{{ service_enabled['auditd.service'] | default('❌') }}] {{ 'Aktif' if service_enabled['auditd.service'] == '✅' else 'Pasif' }}"
          - "└────────────────────────────────────────────────────────────────┘"
          - ""
          - "┌────────────────────────────────────────────────────────────────┐"
          - "│ 🔧 AUDITD KONFIGÜRASYONU                                        │"
          - "├────────────────────────────────────────────────────────────────┤"
          - "│   Syslog plugin : [{{ auditd_plugin_check.stdout | default('❌') }}] {{ 'Aktif' if auditd_plugin_check.stdout == '✅' else 'Aktif Değil' }}"
          - "│   Plugin yolu   : {{ auditd_plugin_path | default('Bulunamadı') }}"
          - "└────────────────────────────────────────────────────────────────┘"
          - ""
          - "┌────────────────────────────────────────────────────────────────┐"
          - "│ 🐚 BASH LOG KONFIGÜRASYONU                                      │"
          - "├────────────────────────────────────────────────────────────────┤"
          - "│   /etc/profile     : [{{ profile_check.stdout | default('❌') }}] {{ 'Yapılandırılmış' if profile_check.stdout == '✅' else 'Yapılandırılmamış' }}"
          - "│   /root/.bashrc    : [{{ bashrc_check.stdout | default('❌') }}] {{ 'Yapılandırılmış' if bashrc_check.stdout == '✅' else 'Yapılandırılmamış' }}"
          - "│   /var/log/bash.log: [{{ '✅' if bash_log_file.stat.exists else '❌' }}] {{ 'Mevcut' if bash_log_file.stat.exists else 'Mevcut Değil' }}"
          - "│   bash.conf        : [{{ bash_conf_check.stdout | default('❌') }}] {{ 'Mevcut' if bash_conf_check.stdout == '✅' else 'Mevcut Değil' }}"
          - "└────────────────────────────────────────────────────────────────┘"
          - ""
          - "┌────────────────────────────────────────────────────────────────┐"
          - "│ 📡 RSYSLOG KONFIGÜRASYONU                                       │"
          - "├────────────────────────────────────────────────────────────────┤"
          - "│   Remote forward (192.168.21.21) : [{{ rsyslog_remote_check.stdout | default('❌') }}] {{ 'Yapılandırılmış' if rsyslog_remote_check.stdout == '✅' else 'Yapılandırılmamış' }}"
          - "│   Auditd log forwarding          : [{{ rsyslog_auditd_check.stdout | default('❌') }}] {{ 'Yapılandırılmış' if rsyslog_auditd_check.stdout == '✅' else 'Yapılandırılmamış' }}"
          - "└────────────────────────────────────────────────────────────────┘"
          - ""
          - "┌────────────────────────────────────────────────────────────────┐"
          - "│ 📋 50-default.conf KONTROLÜ                                     │"
          - "├────────────────────────────────────────────────────────────────┤"
          - "│   auth.log  : [{{ auth_status | default('❌') }}] {{ 'Yapılandırılmış' if auth_status == '✅' else 'Yapılandırılmamış' }}"
          - "│   syslog    : [{{ syslog_status | default('❌') }}] {{ 'Yapılandırılmış' if syslog_status == '✅' else 'Yapılandırılmamış' }}"
          - "│   cron.log  : [{{ cron_status | default('❌') }}] {{ 'Yapılandırılmış' if cron_status == '✅' else 'Yapılandırılmamış' }}"
          - "└────────────────────────────────────────────────────────────────┘"
          - ""
          - "┌────────────────────────────────────────────────────────────────┐"
          - "│ 📝 BASH LOG KAYITLARI                                           │"
          - "├────────────────────────────────────────────────────────────────┤"
          - "│   {{ bash_log_entries.stdout_lines[0] | default('') }}"
          - "│   {{ bash_log_entries.stdout_lines[1] | default('') }}"
          - "│   {{ bash_log_entries.stdout_lines[2] | default('') }}"
          - "│   {{ bash_log_entries.stdout_lines[3] | default('') }}"
          - "└────────────────────────────────────────────────────────────────┘"
          - ""
          - "╔══════════════════════════════════════════════════════════════════════╗"
          - "║                      ✅ = Tamam  ❌ = Eksik/Hatalı                   ║"
          - "╚══════════════════════════════════════════════════════════════════════╝"
