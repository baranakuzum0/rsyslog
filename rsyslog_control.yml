---
- name: RSYSLOG + AUDITD + BASH COMPLIANCE (Fast & Safe)
  hosts: all
  become: yes
  gather_facts: yes

  tasks:

  - name: Gather service facts
    service_facts:

  - name: Set service status facts
    set_fact:
      rsyslog_installed: "{{ 'rsyslog.service' in ansible_facts.services }}"
      rsyslog_active: "{{ ansible_facts.services['rsyslog.service'].state == 'running' if rsyslog_installed else false }}"
      rsyslog_enabled: "{{ ansible_facts.services['rsyslog.service'].enabled if rsyslog_installed else false }}"

      auditd_installed: "{{ 'auditd.service' in ansible_facts.services }}"
      auditd_active: "{{ ansible_facts.services['auditd.service'].state == 'running' if auditd_installed else false }}"
      auditd_enabled: "{{ ansible_facts.services['auditd.service'].enabled if auditd_installed else false }}"

  - name: Check bash logger in /etc/profile
    stat:
      path: /etc/profile
    register: profile_file

  - name: Check bash logger in /root/.bashrc
    stat:
      path: /root/.bashrc
    register: bashrc_file

  - name: Check audit syslog plugin
    stat:
      path: /etc/audit/plugins.d/syslog.conf
    register: audit_plugin_file

  - name: Check /var/log/bash.log
    stat:
      path: /var/log/bash.log
    register: bashlog_stat

  - name: Check local5.debug rule exists
    stat:
      path: /etc/rsyslog.d/bash.conf
    register: local5_conf

  - name: Check audit imfile rule exists
    stat:
      path: /etc/rsyslog.conf
    register: audit_imfile_conf

  - name: Check remote forwarding exists
    shell: grep -q "@192.168.21.21" /etc/rsyslog.conf
    register: remote_check
    ignore_errors: yes

  - name: Check 50-default.conf rules
    stat:
      path: /etc/rsyslog.d/50-default.conf
    register: default_conf

  - name: Build compliance error list
    set_fact:
      compliance_errors: >-
        {{
          []
          + (["rsyslog servisi kurulu değil"] if not rsyslog_installed else [])
          + (["rsyslog servisi aktif değil"] if not rsyslog_active else [])
          + (["rsyslog servisi enabled değil"] if not rsyslog_enabled else [])

          + (["auditd servisi kurulu değil"] if not auditd_installed else [])
          + (["auditd servisi aktif değil"] if not auditd_active else [])
          + (["auditd servisi enabled değil"] if not auditd_enabled else [])

          + (["/etc/profile bash logger eksik"] if profile_file.stat.exists == false else [])
          + (["/root/.bashrc bash logger eksik"] if bashrc_file.stat.exists == false else [])

          + (["auditd syslog plugin yok"] if audit_plugin_file.stat.exists == false else [])
          + (["/var/log/bash.log dosyası yok"] if bashlog_stat.stat.exists == false else [])

          + (["local5.debug rsyslog rule eksik"] if local5_conf.stat.exists == false else [])
          + (["audit imfile rule eksik"] if audit_imfile_conf.stat.exists == false else [])
          + (["rsyslog remote forwarding eksik"] if remote_check.rc != 0 else [])

          + (["50-default.conf eksik"] if default_conf.stat.exists == false else [])
        }}

  - name: Display Compliance Result
    debug:
      msg: |
        ======================================================
        RSYSLOG + AUDITD + BASH DOC COMPLIANCE RAPORU
        ======================================================

        {% if compliance_errors | length == 0 %}
        🎉 Tüm doküman maddeleri eksiksiz uygulanmış.
        {% else %}
        ❌ Eksik / Hatalı Konfigürasyonlar:

        {% for item in compliance_errors %}
        - {{ item }}
        {% endfor %}
        {% endif %}
