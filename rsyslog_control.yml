- name: Check RSYSLOG + Auditd + Bash Log Configuration
  hosts: all
  gather_facts: true
  become: yes
  vars:
    required_packages:
      - auditd
      - rsyslog
    auditd_plugin_paths:
      - /etc/audisp/plugins.d/syslog.conf
      - /etc/audit/plugins.d/syslog.conf

  tasks:
    - name: Check if required packages are installed
      ansible.builtin.package:
        name: "{{ item }}"
        state: present
      check_mode: yes
      register: package_check
      loop: "{{ required_packages }}"
      ignore_errors: yes

    - name: Check service status
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: started
        enabled: yes
      check_mode: yes
      register: service_status
      loop:
        - rsyslog.service
        - auditd.service
      ignore_errors: yes

    - name: Check which auditd plugin path exists
      ansible.builtin.stat:
        path: "{{ item }}"
      loop: "{{ auditd_plugin_paths }}"
      register: auditd_plugin_stat
      ignore_errors: yes

    - name: Set auditd plugin path fact
      set_fact:
        auditd_plugin_path: "{{ item.stat.path }}"
      loop: "{{ auditd_plugin_stat.results }}"
      when: item.stat is defined and item.stat.exists

    - name: Check auditd plugin status
      ansible.builtin.shell: |
        if [ ! -f "{{ auditd_plugin_path }}" ]; then
          echo "❌ Dosya yok"
          exit 0
        fi
        if grep -q "^active\s*=\s*yes" "{{ auditd_plugin_path }}"; then
          echo "✅ Aktif"
        else
          echo "❌ Pasif veya hatalı"
        fi
      executable: /bin/bash
      when: auditd_plugin_path is defined
      changed_when: false
      ignore_errors: yes

    - name: Check bash logging in /etc/profile
      ansible.builtin.shell: |
        if [ ! -f /etc/profile ]; then
          echo "❌"
          exit 0
        fi
        if grep -q "logger -p local5.debug" /etc/profile; then
          echo "✅"
        else
          echo "❌"
        fi
      executable: /bin/bash
      register: profile_check
      changed_when: false
      ignore_errors: yes

    - name: Check bash logging in /root/.bashrc
      ansible.builtin.shell: |
        if [ ! -f /root/.bashrc ]; then
          echo "❌"
          exit 0
        fi
        if grep -q "logger -p local5.debug" /root/.bashrc; then
          echo "✅"
        else
          echo "❌"
        fi
      executable: /bin/bash
      register: bashrc_check
      changed_when: false
      ignore_errors: yes

    - name: Check rsyslog remote forwarding
      ansible.builtin.shell: |
        if [ ! -f /etc/rsyslog.conf ]; then
          echo "❌"
          exit 0
        fi
        if grep -q "local5.*,local6.* @192.168.21.21" /etc/rsyslog.conf; then
          echo "✅"
        else
          echo "❌"
        fi
      executable: /bin/bash
      register: rsyslog_remote_check
      changed_when: false
      ignore_errors: yes

    - name: Check auditd log forwarding
      ansible.builtin.shell: |
        if [ ! -f /etc/rsyslog.conf ]; then
          echo "❌"
          exit 0
        fi
        if grep -q "\$InputFileName /var/log/audit/audit.log" /etc/rsyslog.conf; then
          echo "✅"
        else
          echo "❌"
        fi
      executable: /bin/bash
      register: rsyslog_auditd_check
      changed_when: false
      ignore_errors: yes

    - name: Check bash log file
      ansible.builtin.stat:
        path: /var/log/bash.log
      register: bash_log_file

    - name: Check rsyslog bash configuration
      ansible.builtin.shell: |
        if [ ! -f /etc/rsyslog.d/bash.conf ]; then
          echo "❌"
          exit 0
        fi
        if grep -q "local5.debug.*/var/log/bash.log" /etc/rsyslog.d/bash.conf; then
          echo "✅"
        else
          echo "❌"
        fi
      executable: /bin/bash
      register: bash_conf_check
      changed_when: false
      ignore_errors: yes

    - name: Check 50-default.conf
      ansible.builtin.shell: |
        if [ ! -f /etc/rsyslog.d/50-default.conf ]; then
          echo "❌|❌|❌"
          exit 0
        fi
        
        AUTH="❌"
        SYSLOG="❌"
        CRON="❌"
        
        if grep -q "auth,authpriv.*/var/log/auth.log" /etc/rsyslog.d/50-default.conf; then
          AUTH="✅"
        fi
        
        if grep -q "\*\.\*;auth,authpriv.none.*-/var/log/syslog" /etc/rsyslog.d/50-default.conf; then
          SYSLOG="✅"
        fi
        
        if grep -q "cron.*/var/log/cron.log" /etc/rsyslog.d/50-default.conf; then
          CRON="✅"
        fi
        
        echo "${AUTH}|${SYSLOG}|${CRON}"
      executable: /bin/bash
      register: default_conf_check
      changed_when: false
      ignore_errors: yes

    - name: Check bash log entries
      ansible.builtin.shell: |
        if [ -f /var/log/bash.log ] && [ "$(cat /var/log/bash.log 2>/dev/null | wc -l)" -gt 0 ]; then
          echo "✅ Log var (son 3 satır):"
          tail -3 /var/log/bash.log 2>/dev/null | sed 's/^/    /'
        else
          echo "❌ Log yok"
        fi
      executable: /bin/bash
      register: bash_log_entries
      changed_when: false
      ignore_errors: yes

    - name: Set package status
      set_fact:
        package_status: "{{ package_status | default({}) | combine({item.item: '✅' if not item.changed else '❌'}) }}"
      loop: "{{ package_check.results }}"
      when: package_check.results is defined

    - name: Set service status
      set_fact:
        service_active: "{{ service_active | default({}) | combine({item.item: '✅' if item.status.ActiveState == 'active' else '❌'}) }}"
        service_enabled: "{{ service_enabled | default({}) | combine({item.item: '✅' if item.status.UnitFileState == 'enabled' else '❌'}) }}"
      loop: "{{ service_status.results }}"
      when: service_status.results is defined

    - name: Set 50-default values
      set_fact:
        auth_status: "{{ default_conf_check.stdout.split('|')[0] | default('❌') }}"
        syslog_status: "{{ default_conf_check.stdout.split('|')[1] | default('❌') }}"
        cron_status: "{{ default_conf_check.stdout.split('|')[2] | default('❌') }}"
      when: default_conf_check.stdout is defined

    - name: Display configuration report
      ansible.builtin.debug:
        msg: 
          - "╔══════════════════════════════════════════════════════════════════════╗"
          - "║         RSYSLOG + AUDITD + BASH LOG KONFIGÜRASYON RAPORU            ║"
          - "╚══════════════════════════════════════════════════════════════════════╝"
          - ""
          - "┌────────────────────────────────────────────────────────────────┐"
          - "│ 📦 PAKETLER                                                     │"
          - "├────────────────────────────────────────────────────────────────┤"
          - "│   auditd  : [{{ package_status['auditd'] | default('❌') }}] {{ 'Kurulu' if package_status['auditd'] == '✅' else 'Kurulu Değil' }}"
          - "│   rsyslog : [{{ package_status['rsyslog'] | default('❌') }}] {{ 'Kurulu' if package_status['rsyslog'] == '✅' else 'Kurulu Değil' }}"
          - "└────────────────────────────────────────────────────────────────┘"
          - ""
          - "┌────────────────────────────────────────────────────────────────┐"
          - "│ ⚙️ SERVİSLER                                                    │"
          - "├────────────────────────────────────────────────────────────────┤"
          - "│   rsyslog.service :"
          - "│     • Aktif   : [{{ service_active['rsyslog.service'] | default('❌') }}] {{ 'Çalışıyor' if service_active['rsyslog.service'] == '✅' else 'Çalışmıyor' }}"
          - "│     • Enabled : [{{ service_enabled['rsyslog.service'] | default('❌') }}] {{ 'Aktif' if service_enabled['rsyslog.service'] == '✅' else 'Pasif' }}"
          - "│"
          - "│   auditd.service :"
          - "│     • Aktif   : [{{ service_active['auditd.service'] | default('❌') }}] {{ 'Çalışıyor' if service_active['auditd.service'] == '✅' else 'Çalışmıyor' }}"
          - "│     • Enabled : [{{ service_enabled['auditd.service'] | default('❌') }}] {{ 'Aktif' if service_enabled['auditd.service'] == '✅' else 'Pasif' }}"
          - "└────────────────────────────────────────────────────────────────┘"
          - ""
          - "┌────────────────────────────────────────────────────────────────┐"
          - "│ 🔧 AUDITD KONFIGÜRASYONU                                        │"
          - "├────────────────────────────────────────────────────────────────┤"
          - "│   Syslog plugin : {{ auditd_plugin_check.stdout | default('❌') }}"
          - "│   Plugin yolu   : {{ auditd_plugin_path | default('Bulunamadı') }}"
          - "└────────────────────────────────────────────────────────────────┘"
          - ""
          - "┌────────────────────────────────────────────────────────────────┐"
          - "│ 🐚 BASH LOG KONFIGÜRASYONU                                      │"
          - "├────────────────────────────────────────────────────────────────┤"
          - "│   /etc/profile     : [{{ profile_check.stdout | default('❌') }}]"
          - "│   /root/.bashrc    : [{{ bashrc_check.stdout | default('❌') }}]"
          - "│   /var/log/bash.log: [{{ '✅' if bash_log_file.stat.exists else '❌' }}]"
          - "│   bash.conf        : [{{ bash_conf_check.stdout | default('❌') }}]"
          - "└────────────────────────────────────────────────────────────────┘"
          - ""
          - "┌────────────────────────────────────────────────────────────────┐"
          - "│ 📡 RSYSLOG KONFIGÜRASYONU                                       │"
          - "├────────────────────────────────────────────────────────────────┤"
          - "│   Remote forward    : [{{ rsyslog_remote_check.stdout | default('❌') }}]"
          - "│   Auditd forwarding : [{{ rsyslog_auditd_check.stdout | default('❌') }}]"
          - "└────────────────────────────────────────────────────────────────┘"
          - ""
          - "┌────────────────────────────────────────────────────────────────┐"
          - "│ 📋 50-default.conf                                              │"
          - "├────────────────────────────────────────────────────────────────┤"
          - "│   auth.log  : [{{ auth_status | default('❌') }}]"
          - "│   syslog    : [{{ syslog_status | default('❌') }}]"
          - "│   cron.log  : [{{ cron_status | default('❌') }}]"
          - "└────────────────────────────────────────────────────────────────┘"
          - ""
          - "┌────────────────────────────────────────────────────────────────┐"
          - "│ 📝 BASH LOG KAYITLARI                                           │"
          - "├────────────────────────────────────────────────────────────────┤"
          - "│   {{ bash_log_entries.stdout_lines[0] | default('') }}"
          - "└────────────────────────────────────────────────────────────────┘"
          - ""
          - "╔══════════════════════════════════════════════════════════════════════╗"
          - "║                      ✅ = Tamam  ❌ = Eksik/Hatalı                   ║"
          - "╚══════════════════════════════════════════════════════════════════════╝"
