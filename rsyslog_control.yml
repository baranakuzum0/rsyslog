---
- name: RSYSLOG + AUDITD + BASH DOC COMPLIANCE
  hosts: all
  become: yes
  gather_facts: yes

  tasks:

  #################################################
  # 1️⃣ Service Kontrolü
  #################################################

  - name: Gather service facts
    service_facts:

  - name: Set service status facts
    set_fact:
      rsyslog_installed: "{{ 'rsyslog.service' in ansible_facts.services }}"
      rsyslog_active: "{{ ansible_facts.services['rsyslog.service'].state == 'running' if rsyslog_installed else false }}"
      rsyslog_enabled: "{{ ansible_facts.services['rsyslog.service'].status == 'enabled' if rsyslog_installed else false }}"

      auditd_installed: "{{ 'auditd.service' in ansible_facts.services }}"
      auditd_active: "{{ ansible_facts.services['auditd.service'].state == 'running' if auditd_installed else false }}"
      auditd_enabled: "{{ ansible_facts.services['auditd.service'].status == 'enabled' if auditd_installed else false }}"

  #################################################
  # 2️⃣ Bash Logger Kontrol
  #################################################

  - name: Check bash logger in /etc/profile
    shell: grep -q "history_to_syslog" /etc/profile
    register: profile_check
    ignore_errors: yes

  - name: Check bash logger in /root/.bashrc
    shell: grep -q "history_to_syslog" /root/.bashrc
    register: bashrc_check
    ignore_errors: yes

  #################################################
  # 3️⃣ Auditd Plugin Kontrol
  #################################################

  - name: Check audit syslog plugin
    shell: grep -i "^active *= *yes" /etc/audit/plugins.d/syslog.conf
    register: audit_plugin_check
    ignore_errors: yes

  #################################################
  # 4️⃣ Bash Log Dosyası Kontrol
  #################################################

  - name: Check /var/log/bash.log
    stat:
      path: /var/log/bash.log
    register: bashlog_stat

  #################################################
  # 5️⃣ Rsyslog Kuralları Kontrol
  #################################################

  - name: Check local5.debug rule
    shell: grep -R "local5.debug" /etc/rsyslog*
    register: local5_check
    ignore_errors: yes

  - name: Check audit imfile rule
    shell: grep -R "/var/log/audit/audit.log" /etc/rsyslog*
    register: audit_imfile_check
    ignore_errors: yes

  - name: Check remote forwarding
    shell: grep -R "@192.168.21.21" /etc/rsyslog*
    register: remote_check
    ignore_errors: yes

  #################################################
  # 6️⃣ 50-default.conf Kontrol
  #################################################

  - name: Check 50-default.conf required rules
    shell: |
      grep -q "auth,authpriv.*" /etc/rsyslog.d/50-default.conf &&
      grep -q "\*.\*;auth,authpriv.none" /etc/rsyslog.d/50-default.conf &&
      grep -q "cron.*" /etc/rsyslog.d/50-default.conf
    register: default_conf_check
    ignore_errors: yes

  #################################################
  # 7️⃣ Compliance Listesi Oluşturma
  #################################################

  - name: Build compliance error list
    set_fact:
      compliance_errors: >-
        {{
          []
          + (["rsyslog servisi kurulu değil"] if not rsyslog_installed else [])
          + (["rsyslog servisi aktif değil"] if not rsyslog_active else [])
          + (["rsyslog servisi enabled değil"] if not rsyslog_enabled else [])

          + (["auditd servisi kurulu değil"] if not auditd_installed else [])
          + (["auditd servisi aktif değil"] if not auditd_active else [])
          + (["auditd servisi enabled değil"] if not auditd_enabled else [])

          + (["/etc/profile bash logger eksik"] if profile_check.rc != 0 else [])
          + (["/root/.bashrc bash logger eksik"] if bashrc_check.rc != 0 else [])

          + (["auditd syslog plugin active=yes değil"] if audit_plugin_check.rc != 0 else [])
          + (["/var/log/bash.log dosyası yok"] if not bashlog_stat.stat.exists else [])

          + (["local5.debug rsyslog rule eksik"] if local5_check.rc != 0 else [])
          + (["audit imfile rule eksik"] if audit_imfile_check.rc != 0 else [])
          + (["rsyslog remote forwarding eksik"] if remote_check.rc != 0 else [])

          + (["50-default.conf gerekli kurallar eksik"] if default_conf_check.rc != 0 else [])
        }}

  #################################################
  # 8️⃣ Final Rapor
  #################################################

  - name: Display Compliance Result
    debug:
      msg: |
        ======================================================
        RSYSLOG + AUDITD + BASH DOC COMPLIANCE RAPORU
        ======================================================

        {% if compliance_errors | length == 0 %}
        🎉 Tüm doküman maddeleri eksiksiz uygulanmış.
        {% else %}
        ❌ Eksik / Hatalı Konfigürasyonlar:

        {% for item in compliance_errors %}
        - {{ item }}
        {% endfor %}
        {% endif %}
